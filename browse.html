<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CINEXA+ | Browse Infrastructure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        :root { --accent: #a855f7; --bg: #050505; }
        body { background-color: var(--bg); color: white; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(30px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .hero-gradient { background: linear-gradient(0deg, #050505 0%, rgba(5,5,5,0.4) 60%, transparent 100%); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes popUp { from { opacity: 0; transform: scale(0.9) translateY(30px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .animate-pop { animation: popUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .hero-transition { transition: opacity 1.2s ease-in-out; }
    </style>
</head>
<body onload="initSystem()">

    <div id="profile-gate" class="fixed inset-0 z-[3000] bg-[#050505] flex items-center justify-center p-6 transition-all duration-500">
        <div class="text-center w-full max-w-5xl animate-pop">
            <h1 class="text-xl font-black tracking-[12px] uppercase text-white/10 mb-12">CINEXA<span class="text-purple-500">+</span></h1>
            <h2 class="text-3xl md:text-5xl font-800 italic tracking-tighter mb-12 uppercase">Select Identity</h2>
            <div id="profile-list" class="flex flex-wrap justify-center gap-8 mb-16"></div>
            <button onclick="showCreateModal()" class="glass px-10 py-5 rounded-2xl text-[10px] font-bold uppercase tracking-[4px] hover:bg-white/10 transition">
                <i class="fa-solid fa-plus mr-3 text-purple-500"></i> Add Profile
            </button>
        </div>
    </div>

    <div id="main-app" class="opacity-0 transition-opacity duration-700 hidden">
        
        <nav class="fixed top-0 w-full z-[1000] glass px-6 md:px-10 py-4 flex items-center justify-between">
            <div class="flex items-center gap-12">
                <h1 class="text-xl md:text-2xl font-800 italic tracking-tighter cursor-pointer" onclick="location.reload()">CINEXA<span class="text-purple-500">+</span></h1>
                <div class="hidden lg:flex gap-10 text-[10px] font-bold uppercase tracking-[4px] text-white/30">
                    <a href="#" class="text-white">Discovery</a>
                    <a href="#" onclick="loadCategory('movie')" class="hover:text-white transition">Movies</a>
                    <a href="#" onclick="loadCategory('tv')" class="hover:text-white transition">Series</a>
                </div>
            </div>

            <div class="flex items-center gap-4">
                <div class="relative hidden md:block">
                    <input type="text" id="search-input" onkeyup="if(event.key==='Enter') handleSearch()" placeholder="Search..." class="bg-white/5 border border-white/10 rounded-full py-2.5 px-6 outline-none focus:border-purple-500 w-48 lg:w-64 text-[11px] font-bold">
                </div>
                
                <div class="relative">
                    <div id="nav-initial" onclick="toggleUserMenu()" class="w-10 h-10 rounded-xl flex items-center justify-center text-[12px] font-black cursor-pointer shadow-xl border border-white/10 transition-transform active:scale-95">?</div>
                    
                    <div id="user-menu" class="hidden absolute right-0 mt-4 w-56 glass rounded-2xl p-2 shadow-2xl border-white/20 animate-pop">
                        <button onclick="returnToProfiles()" class="w-full text-left px-4 py-4 text-[10px] font-bold uppercase tracking-widest hover:bg-white/5 rounded-xl transition flex items-center gap-3">
                            <i class="fa-solid fa-user-astronaut text-purple-500"></i> Switch Profile
                        </button>
                        <button onclick="logoutSystem()" class="w-full text-left px-4 py-4 text-[10px] font-bold uppercase tracking-widest text-red-500 hover:bg-red-500/10 rounded-xl transition flex items-center gap-3">
                            <i class="fa-solid fa-power-off"></i> Logout
                        </button>
                    </div>
                </div>
            </div>
        </nav>

        <header class="relative h-[85vh] md:h-[95vh] w-full flex items-end overflow-hidden">
            <img id="hero-img" src="" class="absolute inset-0 w-full h-full object-cover hero-transition">
            <div class="absolute inset-0 hero-gradient"></div>
            <div class="relative z-10 px-8 md:px-24 pb-24 max-w-5xl">
                <h4 id="hero-meta" class="text-purple-500 text-[10px] font-black uppercase tracking-[5px] mb-4">Trending Now</h4>
                <h2 id="hero-title" class="text-5xl md:text-[7rem] font-800 italic uppercase tracking-tighter leading-[0.8] mb-10 drop-shadow-2xl">...</h2>
                <button id="hero-btn" class="bg-white text-black px-12 py-5 rounded-2xl font-black text-[9px] uppercase tracking-[3px] hover:bg-purple-500 hover:text-white transition flex items-center gap-3">
                    <i class="fa-solid fa-play"></i> Watch Trailer
                </button>
            </div>
        </header>

        <main class="px-8 md:px-24 py-20">
            <h3 id="grid-header" class="text-xl font-800 italic uppercase tracking-widest mb-12 border-l-4 border-purple-500 pl-6 text-white/50">Global Library</h3>
            <div id="movie-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6"></div>
        </main>

        <div class="fixed bottom-6 left-6 right-6 z-[1000] lg:hidden">
            <div class="glass rounded-[30px] p-4 flex justify-around items-center shadow-2xl border-white/10">
                <button onclick="location.reload()" class="text-purple-500"><i class="fa-solid fa-house"></i></button>
                <button onclick="loadCategory('movie')" class="text-white/30"><i class="fa-solid fa-film"></i></button>
                <button onclick="toggleUserMenu()" class="text-white/30"><i class="fa-solid fa-user"></i></button>
            </div>
        </div>
    </div>

    <div id="video-overlay" class="fixed inset-0 z-[5000] hidden bg-black flex items-center justify-center p-4">
        <button onclick="stopTrailer()" class="absolute top-10 right-10 text-white hover:text-red-500 transition text-2xl"><i class="fa-solid fa-xmark"></i></button>
        <div id="video-container" class="w-full max-w-6xl aspect-video rounded-3xl overflow-hidden glass shadow-2xl"></div>
    </div>

    <div id="movie-modal" class="fixed inset-0 z-[4000] hidden flex items-center justify-center bg-black/90 backdrop-blur-3xl p-6">
        <div class="glass max-w-6xl w-full rounded-[45px] overflow-hidden relative animate-pop max-h-[90vh] overflow-y-auto no-scrollbar">
            <button onclick="closeModal()" class="absolute top-8 right-8 z-10 w-10 h-10 glass rounded-full flex items-center justify-center hover:bg-red-500 transition"><i class="fa-solid fa-xmark"></i></button>
            <div id="modal-content" class="flex flex-col md:flex-row"></div>
        </div>
    </div>

    <script>
        const TMDB_KEY = '4166e48ae0ebb3f6693923dfe397c0b9';
        let profiles = JSON.parse(localStorage.getItem('cinexa_profiles')) || [{name: 'Haneef', color: 'bg-purple-600'}];
        let trending = [];
        let heroIdx = 0;

        function initSystem() { renderProfiles(); }

        function renderProfiles() {
            const list = document.getElementById('profile-list');
            list.innerHTML = profiles.map((p, i) => `
                <div class="group cursor-pointer text-center" onclick="selectProfile(${i})">
                    <div class="w-28 h-28 md:w-40 md:h-40 rounded-[40px] ${p.color} mx-auto mb-6 flex items-center justify-center text-4xl font-black group-hover:scale-105 transition-all shadow-2xl">${p.name.charAt(0)}</div>
                    <p class="text-[10px] font-black uppercase tracking-[4px] text-white/30 group-hover:text-white">${p.name}</p>
                </div>
            `).join('');
        }

        function selectProfile(i) {
            document.getElementById('profile-gate').classList.add('opacity-0');
            setTimeout(() => {
                document.getElementById('profile-gate').style.display = 'none';
                const app = document.getElementById('main-app');
                app.classList.remove('hidden');
                setTimeout(() => app.classList.add('opacity-100'), 50);
            }, 500);

            const navInit = document.getElementById('nav-initial');
            navInit.innerText = profiles[i].name.charAt(0);
            navInit.className = `w-10 h-10 rounded-xl ${profiles[i].color} flex items-center justify-center text-[12px] font-black cursor-pointer shadow-xl border border-white/10`;
            
            loadData();
        }

        async function loadData() {
            const r = await fetch(`https://api.themoviedb.org/3/trending/all/day?api_key=${TMDB_KEY}`);
            const d = await r.json();
            trending = d.results;
            updateHero();
            renderGrid(trending);
            setInterval(rotateHero, 8000);
        }

        function rotateHero() { heroIdx = (heroIdx + 1) % 5; updateHero(); }

        function updateHero() {
            const m = trending[heroIdx];
            const img = document.getElementById('hero-img');
            img.style.opacity = '0';
            setTimeout(() => {
                img.src = `https://image.tmdb.org/t/p/original${m.backdrop_path}`;
                document.getElementById('hero-title').innerText = m.title || m.name;
                document.getElementById('hero-btn').onclick = () => playTrailer(m.id, m.media_type);
                img.style.opacity = '1';
            }, 800);
        }

        function renderGrid(arr) {
            document.getElementById('movie-grid').innerHTML = arr.map(m => `
                <div class="group cursor-pointer animate-pop" onclick="openModal(${m.id}, '${m.media_type || 'movie'}')">
                    <div class="aspect-[2/3] rounded-[25px] overflow-hidden mb-4 border border-white/5 group-hover:border-purple-500 shadow-xl transition-all">
                        <img src="https://image.tmdb.org/t/p/w500${m.poster_path}" class="w-full h-full object-cover group-hover:scale-110 transition-duration-700">
                    </div>
                    <p class="text-[9px] font-bold uppercase tracking-widest truncate text-white/40">${m.title || m.name}</p>
                </div>
            `).join('');
        }

        async function openModal(id, type) {
            const res = await fetch(`https://api.themoviedb.org/3/${type}/${id}?api_key=${TMDB_KEY}`);
            const d = await res.json();
            document.getElementById('movie-modal').classList.remove('hidden');
            document.getElementById('modal-content').innerHTML = `
                <div class="w-full md:w-1/2"><img src="https://image.tmdb.org/t/p/w500${d.poster_path}" class="w-full h-full object-cover"></div>
                <div class="w-full md:w-1/2 p-12 flex flex-col justify-center">
                    <h2 class="text-4xl font-800 italic uppercase mb-6 tracking-tighter leading-none">${d.title || d.name}</h2>
                    <p class="text-white/40 text-xs leading-relaxed mb-10">${d.overview}</p>
                    <button onclick="playTrailer(${d.id}, '${type}')" class="bg-purple-600 py-4 rounded-xl text-[10px] font-black uppercase tracking-[4px]">Launch Trailer</button>
                </div>
            `;
        }

        async function playTrailer(id, type) {
            const res = await fetch(`https://api.themoviedb.org/3/${type}/${id}/videos?api_key=${TMDB_KEY}`);
            const d = await res.json();
            const key = d.results.find(v => v.type === 'Trailer')?.key;
            if(!key) return alert("Trailer Offline");
            document.getElementById('video-container').innerHTML = `<iframe class="w-full h-full" src="https://www.youtube.com/embed/${key}?autoplay=1" frameborder="0" allowfullscreen></iframe>`;
            document.getElementById('video-overlay').classList.remove('hidden');
        }

        function toggleUserMenu() { document.getElementById('user-menu').classList.toggle('hidden'); }
        function closeModal() { document.getElementById('movie-modal').classList.add('hidden'); }
        function stopTrailer() { document.getElementById('video-overlay').classList.add('hidden'); document.getElementById('video-container').innerHTML = ''; }
        
        function returnToProfiles() { location.reload(); }
        function logoutSystem() { 
            localStorage.removeItem('cinexa_session'); 
            window.location.href = 'index.html'; 
        }

        async function handleSearch() {
            const q = document.getElementById('search-input').value;
            const r = await fetch(`https://api.themoviedb.org/3/search/multi?query=${q}&api_key=${TMDB_KEY}`);
            const d = await r.json();
            document.getElementById('grid-header').innerText = `Search: ${q}`;
            renderGrid(d.results);
            window.scrollTo({top: 800, behavior: 'smooth'});
        }

        async function loadCategory(cat) {
            const r = await fetch(`https://api.themoviedb.org/3/trending/${cat}/week?api_key=${TMDB_KEY}`);
            const d = await r.json();
            document.getElementById('grid-header').innerText = `Trending ${cat}s`;
            renderGrid(d.results);
            window.scrollTo({top: 800, behavior: 'smooth'});
        }
    </script>
</body>
</html>
