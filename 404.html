<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" type="image/jpeg" href="Cinexa v2 Logo.jpeg">
    <meta name="theme-color" content="#050505">
<title>CINEXA+ | 404 SIGNAL LOST</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        body { 
            background-color: #000000; 
            color: white; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            overflow: hidden;
        }

        /* Cinematic Deep Glow */
        .void-bg {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, #1a1033 0%, #000000 80%);
            z-index: -1;
        }

        .glass-card { 
            background: rgba(255, 255, 255, 0.01); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
        }

        /* Signal Flicker Animation */
        @keyframes flicker {
            0% { opacity: 0.97; }
            5% { opacity: 0.90; }
            10% { opacity: 0.97; }
            15% { opacity: 0.4; }
            16% { opacity: 0.97; }
            100% { opacity: 1; }
        }

        .flicker-text {
            animation: flicker 4s infinite linear alternate;
        }

        .glow-text {
            text-shadow: 0 0 30px rgba(168, 85, 247, 0.5);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="void-bg"></div>

    <div class="text-center max-w-2xl">
        <div class="mb-16 opacity-30 tracking-[10px] font-black uppercase text-[10px]">
            System Status: <span class="text-red-500">Disconnected</span>
        </div>

        <div class="relative inline-block mb-10">
            <h1 class="text-[12rem] md:text-[16rem] font-800 italic leading-none tracking-tighter flicker-text glow-text">
                404
            </h1>
            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[120%] h-[1px] bg-white/5 rotate-[-10deg]"></div>
        </div>

        <div class="glass-card p-10 rounded-[40px] relative z-10">
            <h2 class="text-xl font-800 italic uppercase tracking-wider mb-4">No Signal Detected</h2>
            <p class="text-white/40 text-xs font-bold uppercase tracking-[3px] leading-relaxed mb-10">
                The content sequence you are looking for has been moved or encrypted. 
                Please return to the primary deck.
            </p>

            <a href="/" class="inline-flex items-center gap-4 bg-white text-black px-10 py-5 rounded-2xl font-black text-[10px] uppercase tracking-[3px] hover:bg-purple-600 hover:text-white transition-all transform active:scale-95 shadow-2xl">
                <span>Go Back Home</span>
                <i class="fa-solid fa-arrow-left"></i>
            </a>
        </div>

        <div class="mt-20 flex flex-col items-center gap-4">
            <div class="h-12 w-[1px] bg-gradient-to-b from-transparent to-white/20"></div>
            <p class="text-[9px] font-black uppercase tracking-[6px] text-white/10">
                Cinexa Secure Environment // Node: 404-LST
            </p>
        </div>
    </div>
</body>
</html>
