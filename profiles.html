<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Who's Watching? | CINEXA+</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        :root { --accent: #a855f7; --bg: #030303; }
        body { 
            background-color: var(--bg); 
            color: white; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0;
            opacity: 0;
            transition: opacity 0.8s ease;
        }
        
        .ambient-mesh {
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(circle at 50% -20%, rgba(168, 85, 247, 0.12) 0%, transparent 50%),
                radial-gradient(circle at 0% 100%, rgba(59, 130, 246, 0.05) 0%, transparent 40%);
            z-index: -1;
        }

        .profile-card { transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1); }

        .img-container {
            background: linear-gradient(145deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.01) 100%);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.4s ease;
            position: relative;
        }

        .profile-card:hover .img-container { 
            border-color: var(--accent); 
            box-shadow: 0 0 50px rgba(168, 85, 247, 0.25);
            transform: translateY(-10px);
        }

        #loading-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div id="loading-overlay">
        <div class="w-12 h-12 border-4 border-purple-500/20 border-t-purple-500 rounded-full animate-spin"></div>
    </div>

    <div class="ambient-mesh"></div>

    <div id="main-ui" class="w-full max-w-6xl text-center relative z-10">
        <header class="mb-20">
            <h1 class="text-5xl md:text-7xl font-[800] italic tracking-tighter mb-4 uppercase">Who's Watching?</h1>
            <p class="text-white/30 text-[10px] font-black uppercase tracking-[5px]">H.E.M. Media Network</p>
        </header>

        <div id="profile-grid" class="flex flex-wrap justify-center gap-10 md:gap-16 mb-24">
            </div>

        <button onclick="window.logout()" class="text-[10px] font-black uppercase tracking-[4px] text-white/20 hover:text-red-500 transition-all border-b border-transparent hover:border-red-500/50 pb-1">
            Sign Out
        </button>
    </div>

<script>
    const cinexaSession = JSON.parse(localStorage.getItem('cinexaSession') || 'null');
    const currentUserId = cinexaSession && cinexaSession.contact ? cinexaSession.contact : null;

    if (!currentUserId) {
        window.location.replace('login.html');
    }

    const grid = document.getElementById('profile-grid');
    const profiles = JSON.parse(localStorage.getItem(`cinexaProfiles_${encodeURIComponent(currentUserId)}`) || '[]');
    document.getElementById('loading-overlay').style.display = 'none';
    document.body.style.opacity = '1';

    if (!profiles.length) {
        window.location.href = 'add-profile.html';
    } else {
        renderProfiles(profiles);
    }

    function renderProfiles(profiles) {
        const grid = document.getElementById('profile-grid');
        grid.innerHTML = '';

        profiles.forEach((p) => {
            const card = document.createElement('div');
            card.className = 'profile-card group cursor-pointer w-32 md:w-44 text-center';
            card.innerHTML = `
                <div class="img-container aspect-square mb-6 overflow-hidden rounded-[40px] bg-zinc-900 border border-white/5">
                    <img src="${p.icon || 'https://i.pravatar.cc/120?img=12'}" class="w-full h-full object-cover opacity-70 group-hover:opacity-100 transition-all duration-500 scale-110 group-hover:scale-100">
                    <div class="absolute inset-0 bg-purple-500/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                    ${p.isKids ? '<div class="absolute bottom-3 right-3 bg-yellow-400 text-black text-[9px] font-black px-2 py-0.5 rounded shadow-lg">KIDS</div>' : ''}
                </div>
                <p class="text-[12px] font-black uppercase tracking-widest text-white/40 group-hover:text-white transition-all">${p.name || 'Profile'}</p>
            `;
            card.addEventListener('click', () => {
                localStorage.setItem('activeProfile', JSON.stringify(p));
                document.body.style.opacity = '0';
                setTimeout(() => { window.location.href = 'browse.html'; }, 500);
            });
            grid.appendChild(card);
        });

        const addBtn = document.createElement('div');
        addBtn.className = 'profile-card group cursor-pointer w-32 md:w-44 text-center';
        addBtn.innerHTML = `
            <div class="img-container aspect-square mb-6 flex items-center justify-center rounded-[40px] border-dashed border-2 border-white/10 bg-white/[0.01] hover:bg-white/[0.03]">
                <i class="fa-solid fa-plus text-2xl text-white/10 group-hover:text-purple-500 transition-all"></i>
            </div>
            <p class="text-[11px] font-black uppercase tracking-widest text-white/20 group-hover:text-white/50">New Member</p>
        `;
        addBtn.onclick = () => window.location.href = 'add-profile.html';
        grid.appendChild(addBtn);
    }

    window.logout = () => {
        sessionStorage.clear();
        window.location.replace('login.html');
    };
</script>
</body>
</html>
