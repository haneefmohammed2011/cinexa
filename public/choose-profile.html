<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CINEXA+ | Who's Watching?</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { background-color: #050505; color: white; font-family: 'Plus Jakarta Sans', sans-serif; }
        .profile-card:hover img { transform: scale(1.1); border-color: #a855f7; }
        .profile-card img { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center">

    <h1 class="text-3xl md:text-5xl font-800 tracking-tighter mb-12 italic uppercase">Who's Watching?</h1>

    <div id="profile-grid" class="flex flex-wrap justify-center gap-8 px-6">
        <div class="flex flex-col items-center gap-4 animate-pulse">
            <div class="w-32 h-32 md:w-40 md:h-40 bg-white/5 rounded-3xl border border-white/10"></div>
            <div class="w-20 h-3 bg-white/10 rounded"></div>
        </div>
    </div>

    <div class="mt-20 flex flex-col items-center gap-6">
        <a href="account-settings.html" class="text-[10px] font-black uppercase tracking-[3px] text-white/30 hover:text-purple-500 transition-all flex items-center gap-2">
            <i class="fa-solid fa-gear"></i> Account Settings
        </a>
    </div>

    <script>
        const cinexaSession = JSON.parse(localStorage.getItem('cinexaSession') || 'null');
        const currentUserId = cinexaSession && cinexaSession.contact ? cinexaSession.contact : null;

        if (!currentUserId) {
            window.location.href = 'login.html';
        }

        const profileGrid = document.getElementById('profile-grid');
        const profiles = JSON.parse(localStorage.getItem(`cinexaProfiles_${encodeURIComponent(currentUserId)}`) || '[]');

        if (!profiles.length) {
            window.location.href = 'add-profile.html';
        } else {
            profileGrid.innerHTML = '';
            profiles.forEach((profile) => {
                const profileDiv = document.createElement('div');
                profileDiv.className = 'profile-card cursor-pointer group flex flex-col items-center gap-4';
                profileDiv.onclick = () => {
                    localStorage.setItem('activeProfile', JSON.stringify(profile));
                    window.location.href = 'browse.html';
                };

                profileDiv.innerHTML = `
                    <img src="${profile.icon || 'https://i.pravatar.cc/120?img=12'}" class="w-32 h-32 md:w-40 md:h-40 rounded-3xl border-2 border-white/5 object-cover shadow-2xl">
                    <span class="text-sm font-bold text-white/50 group-hover:text-white transition-all">${profile.name || 'Profile'}</span>
                `;
                profileGrid.appendChild(profileDiv);
            });

            const addBtn = document.createElement('div');
            addBtn.className = 'profile-card cursor-pointer group flex flex-col items-center gap-4';
            addBtn.onclick = () => window.location.href = 'add-profile.html';
            addBtn.innerHTML = `
                <div class="w-32 h-32 md:w-40 md:h-40 rounded-3xl border-2 border-dashed border-white/10 flex items-center justify-center group-hover:bg-white/5 transition-all">
                    <i class="fa-solid fa-plus text-3xl text-white/20 group-hover:text-purple-500"></i>
                </div>
                <span class="text-sm font-bold text-white/30">Add Profile</span>
            `;
            profileGrid.appendChild(addBtn);
        }
    </script>
    <script src="https://kit.fontawesome.com/your-kit-code.js" crossorigin="anonymous"></script>
</body>
</html>
