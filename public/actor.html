<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talent Profile | CINEXA+</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        :root { --accent: #a855f7; --bg: #050505; }
        body { background-color: var(--bg); color: white; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        
        .nav-glass { background: rgba(5,5,5,0.8); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .hero-vignette {
            background: linear-gradient(to right, var(--bg) 0%, rgba(5,5,5,0.8) 40%, transparent 100%),
                        linear-gradient(to top, var(--bg) 0%, transparent 50%);
        }
        .movie-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .movie-card:hover { transform: translateY(-8px); filter: brightness(1.2); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

<nav class="fixed top-0 w-full z-[100] px-6 md:px-16 py-5 flex justify-between items-center nav-glass">
    <div class="flex items-center gap-10">
        <h1 class="text-xl font-800 italic tracking-tighter cursor-pointer" onclick="window.location.href='index.html'">
            CINEXA<span class="text-purple-500">+</span>
        </h1>
    </div>
    <button onclick="window.history.back()" class="text-[10px] font-black uppercase tracking-[2px] text-white/40 hover:text-white transition">
        <i class="fa-solid fa-arrow-left mr-2"></i> Back
    </button>
</nav>

<header class="relative min-h-[60vh] w-full flex items-center pt-20">
    <div id="actor-banner" class="absolute inset-0 w-full h-full bg-cover bg-center opacity-30 grayscale transition-opacity duration-1000"></div>
    <div class="absolute inset-0 hero-vignette"></div>
    
    <div class="relative z-10 px-6 md:px-20 flex flex-col md:flex-row items-center gap-12 max-w-7xl mx-auto w-full">
        <img id="actor-profile" src="" class="w-48 md:w-64 aspect-[2/3] object-cover rounded-[32px] border border-white/10 shadow-2xl">
        <div class="text-center md:text-left flex-1">
            <span class="bg-purple-600/20 text-purple-400 text-[10px] font-black px-4 py-1.5 rounded-full uppercase tracking-widest mb-4 inline-block">Featured Talent</span>
            <h2 id="actor-name" class="text-5xl md:text-8xl font-800 italic uppercase tracking-tighter leading-none mb-6">---</h2>
            <p id="actor-bio" class="text-white/50 text-sm md:text-lg leading-relaxed max-w-2xl line-clamp-4 font-medium">Initializing H.E.M. Talent Metadata...</p>
        </div>
    </div>
</header>

<main class="relative z-20 px-6 md:px-20 py-20 space-y-20 max-w-7xl mx-auto">
    <section>
        <h3 class="text-xl font-800 italic uppercase tracking-tight mb-8">Known For</h3>
        <div id="known-for-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6">
            </div>
    </section>
</main>

<script type="module">
    const TMDB_KEY = '4166e48ae0ebb3f6693923dfe397c0b9';
    const urlParams = new URLSearchParams(window.location.search);
    const actorId = urlParams.get('id');

    async function initActor() {
        if (!actorId) {
            window.location.href = 'index.html';
            return;
        }

        try {
            const [details, credits] = await Promise.all([
                fetch(`https://api.themoviedb.org/3/person/${actorId}?api_key=${TMDB_KEY}`).then(r => r.json()),
                fetch(`https://api.themoviedb.org/3/person/${actorId}/movie_credits?api_key=${TMDB_KEY}`).then(r => r.json())
            ]);

            // Fill Identity
            document.title = `${details.name} | CINEXA+`;
            document.getElementById('actor-name').innerText = details.name;
            document.getElementById('actor-bio').innerText = details.biography || "No biography available for this node.";
            document.getElementById('actor-profile').src = `https://image.tmdb.org/t/p/h632${details.profile_path}`;
            
            if (credits.cast.length > 0) {
                document.getElementById('actor-banner').style.backgroundImage = `url(https://image.tmdb.org/t/p/original${credits.cast[0].backdrop_path})`;
            }

            // Render Known For
            const sorted = credits.cast.sort((a, b) => b.popularity - a.popularity).slice(0, 15);
            const grid = document.getElementById('known-for-grid');
            
            grid.innerHTML = sorted.map(m => `
                <div class="movie-card" onclick="window.location.href='show.html?id=${m.id}'">
                    <div class="aspect-[2/3] rounded-2xl overflow-hidden border border-white/5 mb-3">
                        <img src="https://image.tmdb.org/t/p/w500${m.poster_path}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/500x750?text=No+Image'">
                    </div>
                    <p class="text-[10px] font-black uppercase tracking-wider truncate text-white/80">${m.title}</p>
                    <p class="text-[9px] font-bold text-purple-500/80 uppercase">${m.character || 'Actor'}</p>
                </div>
            `).join('');

        } catch (err) {
            console.error("Actor Fetch Error:", err);
        }
    }

    initActor();
</script>
</body>
</html>
