<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CINEXA+ | Choose Your Persona</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { background-color: #050505; color: white; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(30px); border: 1px solid rgba(255, 255, 255, 0.08); }
        
        .avatar-option { 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer; border: 3px solid transparent; overflow: hidden;
            background: #111; aspect-ratio: 1/1; border-radius: 20px;
        }

        .avatar-option img { width: 100%; height: 100%; object-fit: cover; }
        .avatar-option:hover { transform: translateY(-5px); background: #1a1a1a; }
        .avatar-option.selected { 
            border-color: #a855f7; 
            box-shadow: 0 0 25px rgba(168, 85, 247, 0.5); 
            transform: scale(1.05); 
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .scroll-container { height: 500px; overflow-y: auto; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-6xl">
        <header class="text-center mb-8">
            <h1 class="text-6xl font-800 italic tracking-tighter uppercase">Cinexa<span class="text-purple-500">+</span></h1>
            <p class="text-white/30 text-[10px] font-black tracking-[5px] mt-2 uppercase">Select from 60 unique Identities</p>
        </header>

        <div class="glass p-8 rounded-[40px] grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- Left Side: Character Catalog -->
            <div class="lg:col-span-7">
                <div id="avatar-catalog" class="grid grid-cols-4 sm:grid-cols-5 md:grid-cols-6 gap-3 scroll-container pr-4 no-scrollbar">
                    <!-- 60 Avatars Injected Here -->
                </div>
            </div>

            <!-- Right Side: Profile Creation -->
            <div class="lg:col-span-5 flex flex-col justify-center space-y-8 bg-white/[0.01] p-8 rounded-[32px] border border-white/5">
                <div>
                    <label class="block text-[10px] font-black uppercase tracking-widest text-white/40 mb-4">Display Name</label>
                    <input type="text" id="profile-name" placeholder="Who are you?" 
                        class="w-full bg-white/5 border border-white/10 px-6 py-5 rounded-2xl text-xl font-bold outline-none focus:border-purple-500 transition-all">
                </div>

                <div class="flex items-center justify-between bg-white/5 p-6 rounded-2xl border border-white/5">
                    <div>
                        <h4 class="text-sm font-800 italic">Kids Mode</h4>
                        <p class="text-[10px] text-white/30 uppercase mt-1">Restrict Mature Titles</p>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="is-kids" class="sr-only peer">
                        <div class="w-11 h-6 bg-zinc-800 rounded-full peer peer-checked:bg-purple-600 after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:after:translate-x-full"></div>
                    </label>
                </div>

                <button id="save-profile" class="w-full bg-white text-black py-5 rounded-2xl font-black text-xs uppercase tracking-[3px] hover:bg-purple-600 hover:text-white transition-all transform active:scale-95 shadow-2xl">
                    Deploy Profile
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { awsmConfig } from './aws-exports.js';
        let selectedAvatar = "";
        let currentUserId = null;

        const catalog = document.getElementById('avatar-catalog');

        // Loop to create 60 High-Quality Avatars
        for (let i = 1; i <= 60; i++) {
            // Using the 'adventurer' style with unique seeds for 60 distinct characters
            const avatarUrl = `https://api.dicebear.com/7.x/adventurer/svg?seed=CinexaUser${i}&backgroundColor=111111`;
            
            const div = document.createElement('div');
            div.className = 'avatar-option';
            if (i === 1) {
                div.classList.add('selected');
                selectedAvatar = avatarUrl;
            }

            const img = document.createElement('img');
            img.src = avatarUrl;
            img.alt = `Character ${i}`;

            div.onclick = () => {
                document.querySelectorAll('.avatar-option').forEach(el => el.classList.remove('selected'));
                div.classList.add('selected');
                selectedAvatar = avatarUrl;
            };

            div.appendChild(img);
            catalog.appendChild(div);
        }

        // Read session created by signup/login (stored in localStorage by signup/login flows)
        const cinexaSession = JSON.parse(localStorage.getItem('cinexaSession') || 'null');
        if (!cinexaSession || !cinexaSession.contact) {
            // Not signed in, redirect to login
            window.location.href = 'login.html';
        } else {
            currentUserId = cinexaSession.contact;
        }

        document.getElementById('save-profile').onclick = async () => {
            const name = document.getElementById('profile-name').value.trim();
            if (!name) return alert("Please enter a profile name.");

            const btn = document.getElementById('save-profile');
            btn.disabled = true;
            btn.innerText = "Syncing...";

            try {
                // If an API endpoint is configured, call it; otherwise fallback to localStorage
                if (awsmConfig && awsmConfig.apiBaseUrl && !awsmConfig.apiBaseUrl.includes('REPLACE_WITH')) {
                    const res = await fetch(`${awsmConfig.apiBaseUrl}/users/${encodeURIComponent(currentUserId)}/profiles`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name, icon: selectedAvatar, isKids: document.getElementById('is-kids').checked })
                    });
                    if (!res.ok) throw new Error('API error ' + res.status);
                    const { profile } = await res.json();
                    localStorage.setItem('activeProfile', JSON.stringify({ name: profile.name, icon: profile.icon, id: profile.profileId || profile.profileId }));
                    window.location.href = 'browse.html';
                } else {
                    const profilesKey = 'cinexaProfiles_' + encodeURIComponent(currentUserId);
                    const existing = JSON.parse(localStorage.getItem(profilesKey) || '[]');
                    const profile = { id: Date.now().toString(), name, icon: selectedAvatar, isKids: document.getElementById('is-kids').checked, uid: currentUserId };
                    existing.push(profile);
                    localStorage.setItem(profilesKey, JSON.stringify(existing));
                    localStorage.setItem('activeProfile', JSON.stringify({ name: profile.name, icon: profile.icon, id: profile.id }));
                    window.location.href = 'browse.html';
                }
            } catch (err) {
                console.error("Save failed:", err);
                btn.disabled = false;
                btn.innerText = "Deploy Profile";
                alert('Failed to save profile: ' + (err.message || err));
            }
        };
    </script>
</body>
</html>
