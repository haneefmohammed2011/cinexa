<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CINEXA+ | Watch</title>
    <script src="https://quge5.com/88/tag.min.js" data-zone="228172" async data-cfasync="false"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { background-color: #020202; color: white; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        
        .hero-mask { background: linear-gradient(to top, #020202 10%, transparent 100%), linear-gradient(to right, #020202 20%, rgba(2,2,2,0.4) 100%); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(40px); border: 1px solid rgba(255, 255, 255, 0.08); }
        
        /* FIX: Full-Screen Player Logic */
        #viewport-modal {
            display: none; position: fixed; inset: 0; z-index: 5000;
            background: rgba(0,0,0,0.98); backdrop-filter: blur(25px);
            align-items: center; justify-content: center;
        }
        .player-frame {
            position: relative;
            width: 95vw; /* 95% of viewport width */
            height: 53.43vw; /* Maintains 16:9 ratio based on 95vw */
            max-height: 85vh; /* Prevents overflow on tall screens */
            max-width: 1600px;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 100px rgba(168, 85, 247, 0.2);
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Ensure Iframe covers every pixel of the frame */
        #main-iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        .loader-ring {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
        }
    </style>
</head>
<body class="min-h-screen">

    <nav class="fixed top-0 w-full z-[100] px-6 md:px-16 py-8 flex justify-between items-center">
        <h1 class="text-3xl font-900 italic tracking-tighter cursor-pointer" onclick="window.location.href='index.html'">
            CINEXA<span class="text-purple-500">+</span>
        </h1>
        <div class="flex gap-4">
             <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" class="w-10 h-10 rounded-xl border-2 border-purple-500 shadow-lg shadow-purple-500/20">
        </div>
    </nav>

    <div class="fixed inset-0 z-0">
        <img id="detail-bg" src="" class="w-full h-full object-cover opacity-20 scale-105 blur-lg">
        <div class="absolute inset-0 hero-mask"></div>
    </div>

    <main class="relative z-10 pt-48 px-6 md:px-20">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-16">
            <div class="lg:col-span-8">
                <div class="flex items-center gap-4 mb-6">
                    <span class="bg-purple-600 text-[10px] font-900 px-4 py-1.5 rounded uppercase italic">Stream Node 01</span>
                    <span id="vote-avg" class="text-green-400 font-bold font-mono text-sm"></span>
                </div>
                
                <h2 id="show-title" class="text-6xl md:text-9xl font-800 uppercase tracking-tighter leading-[0.8] mb-12 italic">--</h2>
                
                <div class="flex flex-wrap gap-6 mb-16">
                    <button onclick="initStream('main')" class="bg-white text-black px-12 py-6 rounded-2xl font-900 uppercase italic tracking-widest text-sm hover:bg-purple-600 hover:text-white transition-all transform hover:-translate-y-1">
                        <i class="fas fa-play mr-4"></i> Watch Now
                    </button>
                    <button onclick="initStream('trailer')" class="bg-zinc-900 border border-white/10 text-white px-10 py-6 rounded-2xl font-900 uppercase italic tracking-widest text-sm hover:bg-white hover:text-black transition-all">
                        <i class="fas fa-bolt mr-3 text-purple-500"></i> Trailer
                    </button>
                </div>

                <p id="show-desc" class="text-white/50 text-xl max-w-4xl mb-20 font-light leading-relaxed"></p>

                <div>
                    <h3 class="text-[10px] font-900 uppercase tracking-[6px] text-purple-500 mb-10 italic">Personnel Database</h3>
                    <div id="cast-row" class="flex gap-8 overflow-x-auto no-scrollbar pb-10"></div>
                </div>
            </div>
        </div>
    </main>

    <div id="viewport-modal">
        <div class="absolute top-6 left-10 text-white/40 text-[10px] font-black tracking-widest uppercase">
            Cinexa Viewport System // <span id="player-status" class="text-purple-500 italic">Connecting...</span>
        </div>
        <button onclick="closeViewport()" class="absolute top-6 right-10 w-12 h-12 flex items-center justify-center bg-white/10 rounded-full hover:bg-red-500 transition-all text-white z-[6000]">
            <i class="fas fa-times text-xl"></i>
        </button>

        <div class="player-frame">
            <div class="loader-ring text-purple-500">
                <i class="fas fa-circle-notch fa-spin text-4xl"></i>
            </div>
            <iframe id="main-iframe" src="" allowfullscreen allow="autoplay"></iframe>
        </div>
    </div>

    <script>
        const TMDB_KEY = '4166e48ae0ebb3f6693923dfe397c0b9';
        let trailerID = '';
        let contentID = '';
        let contentType = '';

        async function init() {
            const urlParams = new URLSearchParams(window.location.search);
            contentID = urlParams.get('id');
            contentType = urlParams.get('type') || 'movie';

            const res = await fetch(`https://api.themoviedb.org/3/${contentType}/${contentID}?api_key=${TMDB_KEY}&append_to_response=videos,credits`);
            const data = await res.json();

            document.getElementById('detail-bg').src = `https://image.tmdb.org/t/p/original${data.backdrop_path}`;
            document.getElementById('show-title').innerText = data.title || data.name;
            document.getElementById('show-desc').innerText = data.overview;
            document.getElementById('vote-avg').innerText = `CRITIC: ${data.vote_average.toFixed(1)}`;

            document.getElementById('cast-row').innerHTML = data.credits.cast.slice(0, 10).map(c => `
                <div class="min-w-[120px] cursor-pointer group" onclick="window.open('https://www.themoviedb.org/person/${c.id}', '_blank')">
                    <img src="${c.profile_path ? 'https://image.tmdb.org/t/p/w200'+c.profile_path : 'https://via.placeholder.com/200'}" class="w-24 h-24 rounded-2xl object-cover mb-4 border border-white/5 transition-all group-hover:border-purple-500">
                    <p class="text-[9px] font-black uppercase text-white truncate">${c.name}</p>
                </div>
            `).join('');

            const video = data.videos.results.find(v => v.type === 'Trailer');
            if (video) trailerID = video.key;
        }

        function initStream(mode) {
            const modal = document.getElementById('viewport-modal');
            const iframe = document.getElementById('main-iframe');
            const status = document.getElementById('player-status');
            
            modal.style.display = 'flex';
            status.innerText = mode === 'main' ? "Transmitting Stream..." : "Loading Trailer...";
            
            if (mode === 'main') {
                // Fixed: Full content stream using Vidsrc
                iframe.src = `https://vidsrc.me/embed/${contentType}/${contentID}`;
            } else {
                // Fixed: Trailer stream using YouTube
                iframe.src = `https://www.youtube.com/embed/${trailerID}?autoplay=1&modestbranding=1&rel=0`;
            }
        }

        function closeViewport() {
            document.getElementById('viewport-modal').style.display = 'none';
            document.getElementById('main-iframe').src = '';
        }

        window.onload = init;
    </script>
</body>
</html>
