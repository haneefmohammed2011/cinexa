<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | CINEXA+</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        :root { --accent: #a855f7; --bg: #050505; }
        body { 
            background-color: var(--bg); 
            color: white; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Ambient Background Nodes */
        .ambient-glow {
            position: fixed;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.08) 0%, transparent 70%);
            z-index: -1;
            filter: blur(60px);
        }

        .glass-panel {
            background: rgba(15, 15, 15, 0.6);
            backdrop-filter: blur(30px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
        }

        .input-field {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
        }

        .input-field:focus {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.15);
            outline: none;
        }

        .btn-action {
            background: white;
            color: black;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .btn-action:hover {
            background: var(--accent);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(168, 85, 247, 0.25);
        }
    </style>
</head>
<body>

    <div class="ambient-glow" style="top: -10%; right: -10%;"></div>
    <div class="ambient-glow" style="bottom: -10%; left: -10%;"></div>

    <div class="glass-panel p-8 md:p-12 rounded-[32px] w-full max-w-[420px] mx-4 relative z-10">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-[800] italic tracking-tighter mb-1 select-none">
                CINEXA<span class="text-purple-500">+</span>
            </h1>
            <p class="text-[9px] font-black uppercase tracking-[4px] text-white/20">Media Network Terminal</p>
        </div>

        <form id="loginForm" class="space-y-5">
            <div>
                <label class="text-[10px] font-bold uppercase tracking-widest text-white/40 ml-1 mb-2 block">Identifier</label>
                <div class="relative">
                    <i class="fa-regular fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-white/20 text-xs"></i>
                    <input type="email" placeholder="email@hem-group.com" required
                        class="input-field w-full py-4 pl-12 pr-4 rounded-2xl text-sm font-medium text-white placeholder:text-white/10">
                </div>
            </div>

            <div>
                <div class="flex justify-between items-center ml-1 mb-2">
                    <label class="text-[10px] font-bold uppercase tracking-widest text-white/40">Security Key</label>
                    <a href="forgot-password.html" class="text-[9px] font-bold uppercase tracking-widest text-purple-400/60 hover:text-purple-400 transition-colors">Recovery</a>
                </div>
                <div class="relative">
                    <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-white/20 text-xs"></i>
                    <input type="password" placeholder="••••••••" required
                        class="input-field w-full py-4 pl-12 pr-4 rounded-2xl text-sm font-medium text-white placeholder:text-white/10">
                </div>
            </div>

            <div class="flex items-center gap-3 py-2 ml-1">
                <input type="checkbox" id="remember" class="w-4 h-4 rounded border-white/10 bg-white/5 accent-purple-600">
                <label for="remember" class="text-[10px] font-bold uppercase tracking-widest text-white/30 cursor-pointer select-none">Persistent Session</label>
            </div>

            <button type="submit" id="submitBtn" class="btn-action w-full py-4 rounded-2xl font-black text-[11px] uppercase tracking-[2px] mt-4">
                Initialize Access
            </button>
            <div id="login-error" class="text-sm text-red-400 mt-2 hidden"></div>
        </form>

        <div class="mt-10 pt-8 border-t border-white/5 text-center">
            <p class="text-[10px] font-bold text-white/20 uppercase tracking-[2px] mb-4">New to the network?</p>
            <a href="signup.html" class="inline-block text-[11px] font-black uppercase tracking-[2px] text-white hover:text-purple-400 transition-all underline underline-offset-8 decoration-purple-500/30">
                Create Account
            </a>
        </div>
    </div>

    <div class="fixed bottom-8 left-0 right-0 flex justify-center pointer-events-none opacity-20">
        <div class="flex items-center gap-6 text-[8px] font-black uppercase tracking-[4px]">
            <span>H.E.M. CORE V1.0</span>
            <span class="w-1 h-1 rounded-full bg-white/40"></span>
            <span>LAGOS • NEW YORK</span>
            <span class="w-1 h-1 rounded-full bg-white/40"></span>
            <span>ENCRYPTED NODE</span>
        </div>
    </div>
<script type="module">
    import { awsmConfig } from './aws-exports.js';

    const LOCAL_USER_KEY = 'cinexaUsers';
    let Auth = null;
    let amplifyLoaded = false;
    const hasAwsPlaceholder = awsmConfig.userPoolId.includes('REPLACE') || awsmConfig.userPoolWebClientId.includes('REPLACE');

    async function initAuth() {
        if (hasAwsPlaceholder) {
            return;
        }

        try {
            const mod = await import('https://cdn.jsdelivr.net/npm/aws-amplify@5.1.3/dist/aws-amplify.esm.js');
            const Amplify = mod.default || mod.Amplify || mod;
            Auth = mod.Auth;
            Amplify.configure({
                Auth: {
                    region: awsmConfig.region,
                    userPoolId: awsmConfig.userPoolId,
                    userPoolWebClientId: awsmConfig.userPoolWebClientId,
                    authenticationFlowType: 'USER_PASSWORD_AUTH'
                }
            });
            amplifyLoaded = true;
        } catch (err) {
            console.warn('AWS Amplify unavailable, falling back to local auth.', err);
        }
    }

    function getLocalUsers() {
        return JSON.parse(localStorage.getItem(LOCAL_USER_KEY) || '[]');
    }

    function getLocalUser(contact) {
        return getLocalUsers().find(user => user.contact === contact);
    }

    function signInLocal(contact, password) {
        const user = getLocalUser(contact);
        if (!user) throw new Error('User not found. Please sign up first.');
        if (user.pass !== password) throw new Error('Incorrect password.');
        return user;
    }

    function createSession(user) {
        return {
            name: user.name || user.contact.split('@')[0],
            contact: user.contact,
            icon: user.icon || `https://ui-avatars.com/api/?name=${encodeURIComponent(user.name || user.contact)}&background=a855f7&color=fff`
        };
    }

    await initAuth();

    const loginForm = document.getElementById('loginForm');
    const btn = document.getElementById('submitBtn');
    const loginError = document.getElementById('login-error');

    if (!amplifyLoaded) {
        loginError.textContent = 'AWS Cognito is not configured or unavailable. Using local account mode.';
        loginError.classList.remove('hidden');
    }

    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        const email = loginForm.querySelector('input[type="email"]').value.trim();
        const password = loginForm.querySelector('input[type="password"]').value;

        loginError.classList.add('hidden');
        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-circle-notch animate-spin mr-2"></i> Initializing Access...';

        try {
            let user;
            if (amplifyLoaded && !hasAwsPlaceholder) {
                user = await Auth.signIn(email, password);
            } else {
                user = signInLocal(email, password);
            }

            const sessionData = createSession({
                name: (user.attributes && user.attributes.name) || user.name || email.split('@')[0],
                contact: email,
                icon: user.icon || `https://ui-avatars.com/api/?name=${encodeURIComponent(email)}&background=a855f7&color=fff`
            });
            localStorage.setItem('cinexaSession', JSON.stringify(sessionData));
            localStorage.setItem('activeProfile', JSON.stringify(sessionData));
            window.location.replace('browse.html');
        } catch (error) {
            btn.disabled = false;
            loginError.textContent = 'Login failed: ' + (error.code ? error.code + ' - ' : '') + (error.message || error);
            loginError.classList.remove('hidden');
            btn.classList.add('bg-red-500', 'text-white');
            btn.innerHTML = 'Access Denied: Try Again';
            setTimeout(() => {
                btn.classList.remove('bg-red-500', 'text-white');
                btn.innerHTML = 'Initialize Access';
            }, 2000);
            console.error('Auth Error:', error);
        }
    });
</script>
</html>
