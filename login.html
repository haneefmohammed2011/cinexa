<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | CINEXA+</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://sdk.amazonaws.com/js/aws-sdk-2.1500.0.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { background: #050505; color: white; font-family: 'Plus Jakarta Sans', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(30px); border: 1px solid rgba(255, 255, 255, 0.05); }
        input::placeholder { color: rgba(255,255,255,0.2); font-size: 10px; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div class="glass max-w-md w-full p-12 rounded-[40px] text-center shadow-2xl border-white/5">
        <h1 class="text-2xl font-black italic mb-10 tracking-tighter">CINEXA<span class="text-purple-500">+</span></h1>
        
        <div class="space-y-4">
            <input type="text" id="user" placeholder="Username" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl outline-none focus:border-purple-500 transition-all text-sm font-bold">
            <input type="password" id="pass" placeholder="Password" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl outline-none focus:border-purple-500 transition-all text-sm font-bold">
        </div>

        <button id="login-btn" onclick="handleLogin()" class="w-full bg-white text-black py-5 rounded-2xl font-black uppercase text-[10px] tracking-[3px] mt-8 hover:bg-purple-600 hover:text-white transition-all shadow-lg">
            Sign In
        </button>
        
        <p class="mt-10 text-[9px] text-white/20 uppercase tracking-[3px] font-bold">
            New to Cinexa? <a href="signup.html" class="text-white hover:text-purple-500 transition underline decoration-purple-500/30">Create Account</a>
        </p>
    </div>

    <script>
        // AWS CONFIGURATION
        AWS.config.update({ 
            region: 'eu-west-2', 
            accessKeyId: 'AKIAYS2NVVDJNFZHV4F4', 
            secretAccessKey: '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' 
        });

        const docClient = new AWS.DynamoDB.DocumentClient();
        const TABLE_NAME = "CinexaUsers";

        function handleLogin() {
            const userInput = document.getElementById('user').value;
            const passInput = document.getElementById('pass').value;
            const btn = document.getElementById('login-btn');

            if(!userInput || !passInput) return alert("Credentials Required.");

            btn.innerText = "VERIFYING...";
            btn.disabled = true;
            btn.style.opacity = "0.5";

            const params = {
                TableName: TABLE_NAME,
                Key: { "userId": userInput }
            };

            docClient.get(params, (err, data) => {
                if (err) {
                    alert("System Offline: " + err.message);
                    resetBtn();
                } else if (data.Item && data.Item.password === passInput) {
                    // SET THE KEYS FOR BROWSE.HTML
                    localStorage.setItem('cinexa_auth_status', 'true');
                    localStorage.setItem('cinexa_session', JSON.stringify(data.Item));
                    
                    // Redirect
                    window.location.href = 'browse.html';
                } else {
                    alert("Access Denied: Invalid Credentials.");
                    resetBtn();
                }
            });

            function resetBtn() {
                btn.innerText = "SIGN IN";
                btn.disabled = false;
                btn.style.opacity = "1";
            }
        }
    </script>
</body>
</html>
