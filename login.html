\\\<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | CINEXA+</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://sdk.amazonaws.com/js/aws-sdk-2.1500.0.min.js"></script>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body>
    <div class="glass max-w-md w-full p-12 rounded-[40px] text-center">
        <h1 class="text-2xl font-black italic mb-8">CINEXA<span class="text-purple-500">+</span></h1>
        <input type="text" id="user" placeholder="Username" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl mb-4 outline-none focus:border-purple-500">
        <input type="password" id="pass" placeholder="Password" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl mb-8 outline-none focus:border-purple-500">
        <button onclick="handleLogin()" class="w-full bg-white text-black py-4 rounded-2xl font-bold uppercase text-xs tracking-widest">Sign In</button>
        <p class="mt-8 text-[10px] text-white/30 uppercase tracking-widest">New to Cinexa? <a href="signup.html" class="text-white underline">Join Now</a></p>
    </div>

    <script>
        // 1. AWS CONFIGURATION (LONDON REGION)
        AWS.config.update({ 
            region: 'eu-west-2', 
            accessKeyId: 'AKIAYS2NVVDJNFZHV4F4', 
            secretAccessKey: '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' 
        });

        const docClient = new AWS.DynamoDB.DocumentClient();
        const TABLE_NAME = "CinexaUsers"; // Exactly as seen in your screenshot

        function handleLogin() {
            const userInput = document.getElementById('user').value;
            const passInput = document.getElementById('pass').value;

            const params = {
                TableName: TABLE_NAME,
                Key: { "userId": userInput }
            };

            docClient.get(params, (err, data) => {
                if (err) {
                    console.error("AWS Error:", err);
                    alert("Connection Error: " + err.message);
                } else if (data.Item && data.Item.password === passInput) {
                    // Success! Store user data and redirect
                    localStorage.setItem('cinexa_session', JSON.stringify(data.Item));
                    window.location.href = 'browse.html';
                } else {
                    alert("Invalid Username or Password.");
                }
            });
        }
    </script>
</body>
</html>
